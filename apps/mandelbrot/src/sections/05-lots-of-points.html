        <details class="presentation-section">
            <summary>
                <div class="section-heading">
                    <span class="section-kicker">Section 5 · Lots of points!</span>
                </div>
                <span class="section-toggle" aria-hidden="true"></span>
            </summary>
            <div class="section-body">
                <div class="plot-card">
                    <div class="plot-controls">
                        <div class="field">
                            <label for="plot-iterations-input">Iteration cap</label>
                            <input id="plot-iterations-input" type="number" min="10" max="500" step="10" value="80">
                        </div>
                        <div class="field">
                            <label for="plot-color-scheme-select">Color scheme</label>
                            <select id="plot-color-scheme-select">
                                <option value="blue">Blue</option>
                                <option value="annie">Annie</option>
                                <option value="sunset">Sunset</option>
                                <option value="fire">Fire</option>
                                <option value="viridis">Viridis</option>
                                <option value="hsv-cycle">HSV Cycle</option>
                            </select>
                        </div>
                        <button id="plot-reset">Reset graph</button>
                        <button id="plot-reset-view">Reset zoom</button>
                        <button id="plot-densify" class="button-primary">Compute Grid</button>
                        <label class="toggle-field" for="plot-auto-densify-toggle">
                            <span class="toggle-field-label">Auto compute grid</span>
                            <span class="toggle-switch">
                                <input id="plot-auto-densify-toggle" type="checkbox" role="switch" aria-label="Automatically compute a new grid after zooming or panning">
                                <span class="toggle-switch-slider" aria-hidden="true"></span>
                            </span>
                        </label>
                        <label class="toggle-field" for="plot-mesh-toggle">
                            <span class="toggle-field-label">Smooth mesh</span>
                            <span class="toggle-switch">
                                <input id="plot-mesh-toggle" type="checkbox" role="switch" aria-label="Enable smooth mesh interpolation for the current grid">
                                <span class="toggle-switch-slider" aria-hidden="true"></span>
                            </span>
                        </label>
                        <button id="plot-hover-track-toggle" type="button">Mouse sequence tracker: Off</button>
                        <span id="plot-status" class="status-pill black"><span class="status-dot"></span><span>No points yet</span></span>
                    </div>
                    <div class="button-row">
                        <button type="button" class="plot-preset" data-real="1" data-imag="0">Plot 1 + 0i</button>
                        <button type="button" class="plot-preset" data-real="-1" data-imag="0">Plot -1 + 0i</button>
                        <button type="button" class="plot-preset" data-real="0" data-imag="0">Plot 0 + 0i</button>
                        <button type="button" class="plot-preset" data-real="-0.75" data-imag="0.1">Plot -0.75 + 0.1i</button>
                        <button type="button" class="plot-preset" data-real="0.32" data-imag="0.043">Plot 0.32 + 0.043i</button>
                    </div>
                    <div class="plot-frame" id="plot-frame">
                        <canvas id="mandelbrot-gl" class="plot-gl"></canvas>
                        <canvas id="mandelbrot-overlay" class="plot-overlay"></canvas>
                        <div class="plot-viewport-actions">
                            <button id="plot-fullscreen-toggle" type="button" aria-pressed="false">Fullscreen</button>
                        </div>
                        <div class="plot-hud">
                            <span id="plot-center-pill" class="hud-pill">Center: -0.5000 + 0.0000i</span>
                            <span id="plot-scale-pill" class="hud-pill">Width: 4.2000</span>
                            <span id="plot-density-pill" class="hud-pill">Grid level: 0</span>
                        </div>
                        <div class="plot-help">
                            <span class="hud-pill">Drag to pan</span>
                            <span class="hud-pill">Scroll to zoom</span>
                            <span class="hud-pill">Double-click to test a point</span>
                        </div>
                    </div>
                </div>
            </div>
        </details>
