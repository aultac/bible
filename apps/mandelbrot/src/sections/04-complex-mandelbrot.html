        <details class="presentation-section">
            <summary>
                <div class="section-heading">
                    <span class="section-kicker">Section 4 · Complex Mandelbrot Fractal</span>
                </div>
                <span class="section-toggle" aria-hidden="true"></span>
            </summary>
            <div class="section-body">
                <div class="wide-tool-card">
                    <div class="complex-layout">
                        <div class="complex-controls-stack">
                            <div>
                                <label class="complex-expression-label" for="complex-real-input">Choose start</label>
                                <div class="complex-expression">
                                    <span class="complex-expression-token">start =</span>
                                    <input id="complex-real-input" class="complex-number-input" type="number" step="0.01" value="-1" aria-label="Real part">
                                    <span class="complex-expression-token">+</span>
                                    <input id="complex-imag-input" class="complex-number-input" type="number" step="0.01" value="0" aria-label="Imaginary part">
                                    <span class="complex-expression-token">i</span>
                                </div>
                            </div>
                            <div class="button-row">
                                <button type="button" class="complex-preset" data-real="1" data-imag="0">Escapes: 1 + 0i</button>
                                <button type="button" class="complex-preset" data-real="-1" data-imag="0">Stays small: -1 + 0i</button>
                                <button type="button" class="complex-preset" data-real="-0.75" data-imag="0.1">Try -0.75 + 0.1i</button>
                            </div>
                        </div>
                        <div class="canvas-card complex-plane-card">
                            <div class="canvas-shell square complex-plane-shell">
                                <div id="complex-plane-stage" class="complex-plane-stage" aria-hidden="true"></div>
                                <div class="complex-plane-hud">
                                    <span id="complex-c-pill" class="hud-pill">start = -1 + 0i</span>
                                    <span class="hud-pill">Move cursor to sample start</span>
                                </div>
                            </div>
                        </div>
                        <div class="canvas-card complex-growth-card">
                            <h3>How far from center each point gets</h3>
                            <div class="canvas-shell compact-chart-shell">
                                <canvas id="complex-growth-canvas" class="plot-2d"></canvas>
                            </div>
                        </div>
                        <div class="sequence-card complex-table-card">
                            <h3>Step-by-step values</h3>
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Step</th>
                                            <th>zₙ</th>
                                            <th>|zₙ|</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="complex-sequence-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </details>
