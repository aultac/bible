<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>The Ten Plagues of Exodus • Presentation Guide</title>
    <style>
        :root {
            --ink: #111827;
            --paper: #f5f2ea;
            --card: #fffdf8;
            --gold: #d6a542;
            --gold-light: #f6d98d;
            --muted: #6b7280;
            --line: rgba(255, 255, 255, 0.14);
            --header-height: 144px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button,
        a {
            font: inherit;
        }

        button {
            border: 0;
        }

        button:focus-visible,
        a:focus-visible,
        [tabindex]:focus-visible {
            outline: 3px solid var(--gold-light);
            outline-offset: 3px;
        }

        .site-header {
            position: sticky;
            z-index: 50;
            top: 0;
            color: #ffffff;
            background: var(--ink);
            box-shadow: 0 8px 30px rgba(17, 24, 39, 0.25);
        }

        .header-main {
            display: flex;
            min-height: 70px;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            width: min(1600px, calc(100% - 40px));
            margin: 0 auto;
        }

        .brand {
            display: flex;
            flex: 1 1 auto;
            min-width: 0;
            align-items: center;
            gap: 13px;
            color: inherit;
        }

        .brand-mark {
            display: grid;
            flex: 0 0 auto;
            width: 40px;
            height: 40px;
            place-items: center;
            border: 1px solid rgba(246, 217, 141, 0.45);
            color: var(--gold-light);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.55rem;
        }

        .brand-copy {
            flex: 1 1 auto;
            min-width: 0;
        }
        .brand-heading {
            display: flex;
            min-width: 0;
            align-items: baseline;
            gap: 10px;
        }

        .brand-number {
            flex: 0 0 auto;
            color: var(--gold-light);
            font-size: 0.66rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .brand-title {
            display: block;
            min-width: 0;
            margin: 0;
            overflow: hidden;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.2rem, 2vw, 1.7rem);
            line-height: 1.1;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .brand-subtitle {
            display: block;
            margin-top: 2px;
            color: #aeb7c6;
            font-size: 0.67rem;
            font-weight: 700;
            letter-spacing: 0.11em;
            text-transform: uppercase;
        }

        .utility-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .utility-links a {
            color: #d6dbe4;
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
        }

        .utility-links a:hover {
            color: var(--gold-light);
        }

        .desktop-tabs {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            width: 100%;
            border-top: 1px solid var(--line);
        }

        .plague-tab {
            position: relative;
            min-width: 0;
            min-height: 73px;
            padding: 11px 8px 12px;
            border-right: 1px solid var(--line);
            color: #c8ced8;
            background: transparent;
            cursor: pointer;
            text-align: center;
            transition: color 160ms ease, background 160ms ease;
        }

        .plague-tab:last-child {
            border-right: 0;
        }

        .plague-tab::after {
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            height: 4px;
            content: "";
            background: transparent;
        }

        .plague-tab:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
        }

        .plague-tab[aria-selected="true"] {
            color: var(--gold-light);
            background: rgba(214, 165, 66, 0.12);
        }

        .plague-tab[aria-selected="true"]::after {
            background: var(--gold);
        }

        .tab-number {
            display: block;
            margin-bottom: 3px;
            color: var(--gold);
            font-size: 0.68rem;
            font-weight: 900;
            letter-spacing: 0.12em;
        }

        .tab-name {
            display: block;
            overflow: hidden;
            font-size: clamp(0.64rem, 0.78vw, 0.76rem);
            font-weight: 750;
            line-height: 1.15;
            text-overflow: ellipsis;
        }

        .mobile-trigger {
            display: none;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            background: transparent;
            cursor: pointer;
        }

        .mobile-trigger svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-width: 2;
        }

        .mobile-menu {
            display: none;
        }

        .presentation {
            min-height: calc(100vh - var(--header-height));
        }

        .billboard {
            position: relative;
            display: grid;
            width: 100%;
            height: clamp(520px, calc(100svh - var(--header-height)), 920px);
            min-height: 520px;
            place-items: center;
            overflow: hidden;
            color: #ffffff;
            background: #030712;
            isolation: isolate;
        }

        .billboard-image {
            position: absolute;
            z-index: -3;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #030712;
        }


        .carousel-button {
            position: absolute;
            z-index: 2;
            top: 50%;
            display: grid;
            width: clamp(46px, 5vw, 62px);
            height: clamp(46px, 5vw, 62px);
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.45);
            color: #ffffff;
            background: rgba(3, 7, 18, 0.58);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transform: translateY(-50%);
            transition: color 160ms ease, background 160ms ease, transform 160ms ease;
        }

        .carousel-button:hover {
            color: var(--ink);
            background: var(--gold-light);
            transform: translateY(-50%) scale(1.04);
        }

        .carousel-button.previous {
            left: clamp(14px, 3vw, 42px);
        }

        .carousel-button.next {
            right: clamp(14px, 3vw, 42px);
        }

        .carousel-button svg {
            width: 27px;
            height: 27px;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2;
        }

        .carousel-status {
            position: absolute;
            right: 0;
            bottom: clamp(24px, 4vw, 48px);
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 13px;
        }

        .carousel-count {
            min-width: 48px;
            color: #ffffff;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-align: center;
        }

        .carousel-dots {
            display: flex;
            gap: 8px;
        }

        .carousel-dot {
            width: 10px;
            height: 10px;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            cursor: pointer;
        }

        .carousel-dot[aria-current="true"] {
            border-color: var(--gold-light);
            background: var(--gold-light);
            transform: scale(1.2);
        }

        .gods-section {
            padding: clamp(52px, 7vw, 92px) 20px clamp(64px, 8vw, 110px);
            background:
                radial-gradient(circle at top left, rgba(214, 165, 66, 0.12), transparent 36%),
                var(--paper);
        }

        .gods-shell {
            width: min(1260px, 100%);
            margin: 0 auto;
        }

        .section-heading {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: clamp(28px, 4vw, 45px);
        }

        .section-eyebrow {
            margin: 0 0 8px;
            color: #9a6700;
            font-size: 0.74rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .section-heading h2 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 4.5vw, 4.5rem);
            line-height: 1;
            letter-spacing: -0.035em;
        }


        .god-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            gap: clamp(18px, 2.5vw, 30px);
        }

        .god-grid.single {
            width: 100%;
            max-width: 540px;
            grid-template-columns: minmax(0, 1fr);
            margin: 0 auto;
        }

        .god-card {
            display: flex;
            min-width: 0;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ded7c7;
            background: var(--card);
            box-shadow: 0 14px 38px rgba(17, 24, 39, 0.09);
        }

        .god-image-link,
        .god-image-shell {
            position: relative;
            display: grid;
            height: clamp(480px, 52vw, 680px);
            place-items: center;
            overflow: hidden;
            border-bottom: 1px solid #ded7c7;
            background:
                linear-gradient(135deg, rgba(214, 165, 66, 0.12), rgba(255, 255, 255, 0.82)),
                #eee8da;
        }

        .god-image-link {
            color: inherit;
            text-decoration: none;
        }

        .god-image {
            display: block;
            width: 100%;
            height: 100%;
            padding: 18px;
            object-fit: contain;
            transition: transform 220ms ease;
        }

        .god-image-link:hover .god-image {
            transform: scale(1.035);
        }

        .source-label {
            position: absolute;
            right: 10px;
            bottom: 10px;
            padding: 5px 8px;
            color: #ffffff;
            background: rgba(17, 24, 39, 0.76);
            font-size: 0.63rem;
            font-weight: 850;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .god-copy {
            flex: 1;
            padding: 21px 23px 24px;
        }

        .god-name {
            margin: 0 0 7px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.7rem, 3vw, 2.35rem);
            line-height: 1;
        }

        .god-description {
            margin: 0;
            color: #525a67;
            font-size: 0.94rem;
            line-height: 1.55;
        }

        .deity-mosaic {
            display: grid;
            width: 100%;
            height: 100%;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2px;
            background: #c8bfae;
        }

        .deity-mosaic img {
            display: block;
            width: 100%;
            height: 100%;
            padding: 8px;
            object-fit: contain;
            background: #f5efe2;
        }

        .page-footer {
            padding: 24px 20px;
            border-top: 1px solid #303849;
            color: #9da7b7;
            background: var(--ink);
            font-size: 0.72rem;
            line-height: 1.6;
            text-align: center;
        }

        .page-footer a {
            color: #d8dde5;
        }

        @media (max-width: 1100px) {
            :root {
                --header-height: 134px;
            }

            .plague-tab {
                min-height: 63px;
                padding: 9px 4px;
            }

            .utility-links {
                gap: 13px;
            }
        }

        @media (max-width: 860px) {
            :root {
                --header-height: 72px;
            }

            .header-main {
                min-height: var(--header-height);
                width: min(1600px, calc(100% - 28px));
            }

            .brand-mark {
                width: 36px;
                height: 36px;
            }

            .desktop-tabs,
            .utility-links {
                display: none;
            }

            .brand-heading {
                gap: 7px;
            }

            .brand-number {
                font-size: 0.58rem;
            }

            .brand-title {
                font-size: 1.08rem;
            }

            .brand-subtitle {
                font-size: 0.6rem;
                letter-spacing: 0.08em;
            }

            .mobile-trigger {
                display: flex;
                flex: 0 0 auto;
            }

            .mobile-menu {
                position: absolute;
                top: 100%;
                right: 0;
                left: 0;
                overflow: auto;
                max-height: calc(100svh - var(--header-height));
                padding: 14px;
                border-top: 1px solid var(--line);
                background: #151d2b;
                box-shadow: 0 20px 40px rgba(3, 7, 18, 0.36);
            }

            .mobile-menu.open {
                display: block;
            }

            .mobile-menu-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
            }

            .mobile-plague-button {
                display: flex;
                min-height: 58px;
                align-items: center;
                gap: 11px;
                padding: 10px 12px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #dde2ea;
                background: rgba(255, 255, 255, 0.04);
                cursor: pointer;
                text-align: left;
            }

            .mobile-plague-button[aria-current="true"] {
                border-color: rgba(246, 217, 141, 0.55);
                color: var(--gold-light);
                background: rgba(214, 165, 66, 0.14);
            }

            .mobile-number {
                color: var(--gold);
                font-size: 0.72rem;
                font-weight: 900;
                letter-spacing: 0.1em;
            }

            .mobile-name {
                font-size: 0.79rem;
                font-weight: 750;
                line-height: 1.15;
            }

            .mobile-utility-links {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                margin-top: 12px;
            }

            .mobile-utility-links a {
                padding: 12px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #cdd3dc;
                font-size: 0.76rem;
                font-weight: 750;
                text-align: center;
                text-decoration: none;
            }

            .billboard {
                height: clamp(470px, calc(100svh - var(--header-height)), 760px);
                min-height: 470px;
            }


            .carousel-button {
                top: auto;
                bottom: 20px;
                transform: none;
            }

            .carousel-button:hover {
                transform: scale(1.04);
            }

            .carousel-button.previous {
                left: 18px;
            }

            .carousel-button.next {
                right: 18px;
            }

            .carousel-status {
                bottom: 36px;
            }

            .section-heading {
                display: block;
            }

        }

        @media (max-width: 540px) {
            .brand-title {
                font-size: 0.98rem;
            }

            .mobile-menu-grid {
                grid-template-columns: 1fr;
            }

            .mobile-plague-button {
                min-height: 50px;
            }

            .billboard {
                height: 68svh;
                min-height: 460px;
                max-height: 640px;
            }


            .carousel-button {
                width: 44px;
                height: 44px;
            }

            .carousel-status {
                bottom: 32px;
            }

            .carousel-dots {
                gap: 6px;
            }

            .gods-section {
                padding-right: 14px;
                padding-left: 14px;
            }

            .god-image-link,
            .god-image-shell {
                height: clamp(440px, 120vw, 580px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-main">
            <div class="brand" aria-live="polite">
                <span class="brand-mark" aria-hidden="true">X</span>
                <div class="brand-copy">
                    <div class="brand-heading">
                        <span class="brand-number" id="header-plague-number">Plague 01</span>
                        <h1 class="brand-title" id="header-plague-title">The Nile Turns to Blood</h1>
                    </div>
                    <span class="brand-subtitle" id="header-plague-scripture">Exodus 7:14–25</span>
                </div>
            </div>
            <nav class="utility-links" aria-label="Related tools">
                <a href="../">Tools home</a>
                <a href="../egyptian-deities/">Egyptian Deities</a>
            </nav>
            <button class="mobile-trigger"
                    id="mobile-trigger"
                    type="button"
                    aria-expanded="false"
                    aria-controls="mobile-menu"
                    aria-label="Open plague menu">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 7h16M4 12h16M4 17h16"></path>
                </svg>
            </button>
        </div>
        <nav class="desktop-tabs" id="desktop-tabs" aria-label="Choose a plague" role="tablist"></nav>
        <nav class="mobile-menu" id="mobile-menu" aria-label="Choose a plague"></nav>
    </header>

    <main class="presentation" id="presentation"></main>

    <footer class="page-footer">
        Egyptian deity images are cached locally from
        <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener">Wikimedia Commons</a>.
        Deity pairings are traditional teaching associations rather than identifications made explicitly in Exodus.
    </footer>

    <script>

            {

                    },
                    {

                ]
            },
            {
                number: 5,
                slug: 'livestock',

                billboardImages: [
                    { src: 'assets/plagues/plague-05-01-livestock.jpg', alt: 'Egyptian livestock struck during the fifth plague' },

                ],
                gods: [
                    {

                    {

            },
            {
                number: 6,
                slug: 'boils',
                tabName: 'Boils',
                name: 'Boils',
                scripture: 'Exodus 9:8–12',
                billboardImages: [
                    { src: 'assets/plagues/plague-06-01-boils-court.jpg', alt: 'Egyptians in Pharaoh’s court afflicted with boils' },
                    { src: 'assets/plagues/plague-06-02-boils-apis-temple.jpg', alt: 'The plague of boils at an Egyptian temple' }
                ],
                gods: [
                    {
                        name: 'Sekhmet',
                        description: 'Goddess of war, plague, protection, and healing.',
                        image: 'assets/Sekhmet_statues_Louvre.JPG',
                        alt: 'Lioness-headed statues of Sekhmet',
                        source: 'https://commons.wikimedia.org/wiki/File:Sekhmet_statues_Louvre.JPG'
                    },
                    {
                        name: 'Isis',
                        description: 'Goddess of motherhood, magic, protection, and healing.',
                        image: 'assets/deities/isis.svg',
                        alt: 'Isis, Egyptian goddess of motherhood and magic',
                        source: 'https://commons.wikimedia.org/wiki/File:Isis.svg'
                    }
                ]
            },
            {
                number: 7,
                slug: 'hail',
                tabName: 'Hail',
                name: 'Hail and Fire',
                scripture: 'Exodus 9:13–35',
                billboardImages: [
                    { src: 'assets/plagues/plague-07-01-hail.jpg', alt: 'Destructive hail and fire falling on Egypt' },
                    { src: 'assets/plagues/plague-07-02-hail.png', alt: 'The seventh plague of hail over Egypt' },
                    { src: 'assets/plagues/plague-07-03-hail-funny-fist.jpg', alt: 'A dramatic depiction of the hail plague' }
                ],
                gods: [
                    {
                        name: 'Nut',
                        description: 'Goddess of the sky, stars, and the heavens.',
                        image: 'assets/god-nut.png',
                        alt: 'Nut, Egyptian goddess of the sky',
                        source: 'https://commons.wikimedia.org/wiki/File:Nut_(goddess).png'
                    },
                    {
                        name: 'Shu',
                        description: 'God of air, wind, and the space between earth and sky.',
                        image: 'assets/deities/shu.svg',
                        alt: 'Shu, Egyptian god of air',
                        source: 'https://commons.wikimedia.org/wiki/File:Shu.svg'
                    },
                    {
                        name: 'Set',
                        description: 'God of storms, disorder, violence, and the desert.',
                        image: 'assets/deities/set.svg',
                        alt: 'Set, Egyptian god of storms and disorder',
                        source: 'https://commons.wikimedia.org/wiki/File:Set.svg'
                    }
                ]
            },
            {
                number: 8,
                slug: 'locusts',
                tabName: 'Locusts',
                name: 'Locusts',
                scripture: 'Exodus 10:1–20',
                billboardImages: [
                    { src: 'assets/plagues/plague-08-locusts.png', alt: 'A vast swarm of locusts consuming Egypt’s crops' },
                    { src: 'assets/plagues/plague-08-02-locusts-madagascar.jpg', alt: 'Locusts covering the ground during an outbreak in Madagascar' },
                    { src: 'assets/plagues/plague-08-03-locusts-madagascar.jpg', alt: 'A dense group of locusts during an outbreak in Madagascar' },
                    { src: 'assets/plagues/plague-08-04-locusts-madagascar.jpg', alt: 'Locusts gathered together during an outbreak in Madagascar' },
                    { src: 'assets/plagues/plague-08-05-locusts-madagascar.jpg', alt: 'A field affected by locusts in Madagascar' }
                ],
                gods: [
                    {
                        name: 'Osiris',
                        description: 'God of the dead, resurrection, grain, and renewal.',
                        image: 'assets/god-osiris.png',
                        alt: 'Osiris, Egyptian god of resurrection and grain',
                        source: 'https://commons.wikimedia.org/wiki/File:Osiris_(God).png'
                    },
                    {
                        name: 'Renenutet',
                        description: 'Goddess of nourishment, harvest, and stored grain.',
                        image: 'assets/deities/renenutet.svg',
                        alt: 'Renenutet, Egyptian goddess of harvest',
                        source: 'https://commons.wikimedia.org/wiki/File:Renenutet.svg'
                    }
                ]
            },
            {
                number: 9,
                slug: 'darkness',
                tabName: 'Darkness',
                name: 'Darkness',
                scripture: 'Exodus 10:21–29',
                billboardImages: [
                    { src: 'assets/plagues/plague-09-01-darkness.png', alt: 'A deep darkness covering Egypt during the ninth plague' },
                    { src: 'assets/plagues/plague-09-02-darkness.png', alt: 'Egypt engulfed in darkness while Israel has light' }
                ],
                gods: [
                    {
                        name: 'Amun-Ra',
                        description: 'King of the gods; god of the sun, creation, and hidden power.',
                        image: 'assets/deities/amun-ra.jpg',
                        alt: 'Ram-headed sphinx representing Amun-Ra',
                        source: 'https://commons.wikimedia.org/wiki/File:Ram-Sphinx_of_Amun-Ra.jpg'
                    },
                    {
                        name: 'Ra + Horus',
                        description: 'Ra-Horakhty: god of the sun, horizon, and royal kingship.',
                        image: 'assets/Re-Horakhty.svg',
                        alt: 'Ra-Horakhty, the combined Ra and Horus solar god',
                        source: 'https://commons.wikimedia.org/wiki/File:Re-Horakhty.svg'
                    },
                    {
                        name: 'Khepri',
                        description: 'God of the rising sun, creation, and solar renewal.',
                        image: 'assets/god-khepri.png',
                        alt: 'Khepri, scarab-headed Egyptian god of the rising sun',
                        source: 'https://commons.wikimedia.org/wiki/File:Khepri_(God).png'
                    }
                ]
            },
            {
                number: 10,
                slug: 'firstborn',
                tabName: 'Firstborn',
                name: 'Death of the Firstborn',
                scripture: 'Exodus 11:1–12:36',
                billboardImages: [
                    { src: 'assets/plagues/plague-10-firstborn.png', alt: 'The death of Egypt’s firstborn during the tenth plague' }
                ],
                gods: [
                    {
                        name: 'All the Gods of Egypt',
                        description: 'Every divine power claimed by Egypt stood under judgment.',
                        images: [
                            { src: 'assets/deities/khnum.svg', alt: 'Khnum' },
                            { src: 'assets/god-hapi.png', alt: 'Hapi' },
                            { src: 'assets/god-khepri.png', alt: 'Khepri' },
                            { src: 'assets/god-nut.png', alt: 'Nut' },
                            { src: 'assets/deities/isis.svg', alt: 'Isis' },
                            { src: 'assets/god-osiris.png', alt: 'Osiris' }
                        ]
                    },
                    {
                        name: 'Pharaoh',
                        description: 'Divine king of Egypt and guarantor of royal order.',
                        image: 'assets/tutankhamun-burial-mask.jpg',
                        alt: 'Tutankhamun burial mask representing divine Pharaoh',
                        source: 'https://commons.wikimedia.org/wiki/File:King_Tut_Burial_Mask.jpg'
                    }
                ]
            }
        ];

        const presentation = document.getElementById('presentation');
        const desktopTabs = document.getElementById('desktop-tabs');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileTrigger = document.getElementById('mobile-trigger');
        const headerPlagueNumber = document.getElementById('header-plague-number');
        const headerPlagueTitle = document.getElementById('header-plague-title');
        const headerPlagueScripture = document.getElementById('header-plague-scripture');

        let activePlagueIndex = 0;
        let activeSlideIndex = 0;
        let touchStartX = null;

        const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (character) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[character]));

        const twoDigitNumber = (number) => String(number).padStart(2, '0');

        function renderHeader() {
            const plague = plagues[activePlagueIndex];
            headerPlagueNumber.textContent = `Plague ${twoDigitNumber(plague.number)}`;
            headerPlagueTitle.textContent = plague.name;
            headerPlagueScripture.textContent = plague.scripture;
            document.title = `${twoDigitNumber(plague.number)} — ${plague.name} • Ten Plagues`;
        }

        function renderDesktopTabs() {
            desktopTabs.innerHTML = plagues.map((plague, index) => `
                <button class="plague-tab"
                        id="tab-${escapeHtml(plague.slug)}"
                        type="button"
                        role="tab"
                        aria-selected="${index === activePlagueIndex}"
                        aria-controls="plague-panel"
                        tabindex="${index === activePlagueIndex ? '0' : '-1'}"
                        data-plague-index="${index}">
                    <span class="tab-number">${twoDigitNumber(plague.number)}</span>
                    <span class="tab-name">${escapeHtml(plague.tabName)}</span>
                </button>
            `).join('');
        }

        function renderMobileMenu() {
            mobileMenu.innerHTML = `
                <div class="mobile-menu-grid">
                    ${plagues.map((plague, index) => `
                        <button class="mobile-plague-button"
                                type="button"
                                aria-current="${index === activePlagueIndex}"
                                data-plague-index="${index}">
                            <span class="mobile-number">${twoDigitNumber(plague.number)}</span>
                            <span class="mobile-name">${escapeHtml(plague.name)}</span>
                        </button>
                    `).join('')}
                </div>
                <div class="mobile-utility-links">
                    <a href="../">Tools home</a>
                    <a href="../egyptian-deities/">Egyptian Deities</a>
                </div>
            `;
        }

        function renderGodImage(god) {
            if (god.images) {
                return `
                    <div class="god-image-shell">
                        <div class="deity-mosaic" role="img" aria-label="A selection of Egyptian gods">
                            ${god.images.map((image) => `
                                <img src="${escapeHtml(image.src)}"
                                     alt="${escapeHtml(image.alt)}"
                                     loading="lazy"
                                     decoding="async">
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            return `
                <a class="god-image-link"
                   href="${escapeHtml(god.source)}"
                   target="_blank"
                   rel="noopener"
                   aria-label="View image source for ${escapeHtml(god.name)}">
                    <img class="god-image"
                         src="${escapeHtml(god.image)}"
                         alt="${escapeHtml(god.alt)}"
                         loading="lazy"
                         decoding="async">
                    <span class="source-label">Image source</span>
                </a>
            `;
        }

        function renderGodCard(god) {
            return `
                <article class="god-card">
                    ${renderGodImage(god)}
                    <div class="god-copy">
                        <h3 class="god-name">${escapeHtml(god.name)}</h3>
                        <p class="god-description">${escapeHtml(god.description)}</p>
                    </div>
                </article>
            `;
        }

        function renderPresentation() {
            const plague = plagues[activePlagueIndex];
            const image = plague.billboardImages[activeSlideIndex];
            const hasMultipleImages = plague.billboardImages.length > 1;
            const godGridClass = plague.gods.length === 1 ? 'god-grid single' : 'god-grid';

            presentation.innerHTML = `
                <article id="plague-panel"
                         role="tabpanel"
                         aria-labelledby="tab-${escapeHtml(plague.slug)}">
                    <section class="billboard"
                             id="billboard"
                             tabindex="0"
                             aria-label="${escapeHtml(plague.name)} image ${activeSlideIndex + 1} of ${plague.billboardImages.length}">
                        <img class="billboard-image"
                             src="${escapeHtml(image.src)}"
                             alt="${escapeHtml(image.alt)}"
                             loading="eager"
                             decoding="async">
                        ${hasMultipleImages ? `
                            <button class="carousel-button previous"
                                    type="button"
                                    data-carousel-direction="-1"
                                    aria-label="Show previous image">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="m15 18-6-6 6-6"></path>
                                </svg>
                            </button>
                            <button class="carousel-button next"
                                    type="button"
                                    data-carousel-direction="1"
                                    aria-label="Show next image">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="m9 18 6-6-6-6"></path>
                                </svg>
                            </button>
                            <div class="carousel-status" aria-label="Image carousel position">
                                <span class="carousel-count">${activeSlideIndex + 1} / ${plague.billboardImages.length}</span>
                                <div class="carousel-dots">
                                    ${plague.billboardImages.map((_, index) => `
                                        <button class="carousel-dot"
                                                type="button"
                                                data-slide-index="${index}"
                                                aria-current="${index === activeSlideIndex}"
                                                aria-label="Show image ${index + 1}"></button>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </section>
                    <section class="gods-section" aria-labelledby="gods-heading">
                        <div class="gods-shell">
                            <header class="section-heading">
                                <div>
                                    <p class="section-eyebrow">Egyptian association</p>
                                    <h2 id="gods-heading">${plague.number === 10 ? 'Judgment on Egypt’s Gods' : 'Gods Associated with This Plague'}</h2>
                                </div>
                            </header>
                            <div class="${godGridClass}">
                                ${plague.gods.map(renderGodCard).join('')}
                            </div>
                        </div>
                    </section>
                </article>
            `;
        }

        function render() {
            renderHeader();
            renderDesktopTabs();
            renderMobileMenu();
            renderPresentation();
        }

        function closeMobileMenu({ returnFocus = false } = {}) {
            mobileMenu.classList.remove('open');
            mobileTrigger.setAttribute('aria-expanded', 'false');
            mobileTrigger.setAttribute('aria-label', 'Open plague menu');

            if (returnFocus) {
                mobileTrigger.focus();
            }
        }

        function toggleMobileMenu() {
            const isOpening = !mobileMenu.classList.contains('open');
            mobileMenu.classList.toggle('open', isOpening);
            mobileTrigger.setAttribute('aria-expanded', String(isOpening));
            mobileTrigger.setAttribute('aria-label', isOpening ? 'Close plague menu' : 'Open plague menu');

            if (isOpening) {
                mobileMenu.querySelector('[aria-current="true"]')?.focus();
            }
        }

        function setActivePlague(index, { updateHash = true, focusPresentation = false } = {}) {
            if (!Number.isInteger(index) || index < 0 || index >= plagues.length) {
                return;
            }

            activePlagueIndex = index;
            activeSlideIndex = 0;
            closeMobileMenu();
            render();

            const plague = plagues[index];
            if (updateHash && window.location.hash !== `#${plague.slug}`) {
                history.pushState(null, '', `#${plague.slug}`);
            }

            if (focusPresentation) {
                document.getElementById('billboard')?.focus({ preventScroll: true });
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setActiveSlide(index) {
            const images = plagues[activePlagueIndex].billboardImages;
            activeSlideIndex = (index + images.length) % images.length;
            renderPresentation();
            document.getElementById('billboard')?.focus({ preventScroll: true });
        }

        function plagueIndexFromHash() {
            const slug = decodeURIComponent(window.location.hash.replace(/^#/, ''));
            const index = plagues.findIndex((plague) => plague.slug === slug);
            return index >= 0 ? index : 0;
        }

        desktopTabs.addEventListener('click', (event) => {
            const tab = event.target.closest('[data-plague-index]');
            if (tab) {
                setActivePlague(Number(tab.dataset.plagueIndex), { focusPresentation: true });
            }
        });

        desktopTabs.addEventListener('keydown', (event) => {
            if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) {
                return;
            }

            event.preventDefault();
            let nextIndex = activePlagueIndex;

            if (event.key === 'ArrowLeft') nextIndex = (activePlagueIndex - 1 + plagues.length) % plagues.length;
            if (event.key === 'ArrowRight') nextIndex = (activePlagueIndex + 1) % plagues.length;
            if (event.key === 'Home') nextIndex = 0;
            if (event.key === 'End') nextIndex = plagues.length - 1;

            setActivePlague(nextIndex);
            document.querySelector(`.plague-tab[data-plague-index="${nextIndex}"]`)?.focus();
        });

        mobileTrigger.addEventListener('click', toggleMobileMenu);

        mobileMenu.addEventListener('click', (event) => {
            const button = event.target.closest('[data-plague-index]');
            if (button) {
                setActivePlague(Number(button.dataset.plagueIndex), { focusPresentation: true });
            }
        });

        presentation.addEventListener('click', (event) => {
            const directionButton = event.target.closest('[data-carousel-direction]');
            if (directionButton) {
                setActiveSlide(activeSlideIndex + Number(directionButton.dataset.carouselDirection));
                return;
            }

            const dotButton = event.target.closest('[data-slide-index]');
            if (dotButton) {
                setActiveSlide(Number(dotButton.dataset.slideIndex));
            }
        });

        presentation.addEventListener('keydown', (event) => {
            if (!event.target.closest('#billboard')) {
                return;
            }

            if (event.key === 'ArrowLeft') {
                event.preventDefault();
                setActiveSlide(activeSlideIndex - 1);
            }

            if (event.key === 'ArrowRight') {
                event.preventDefault();
                setActiveSlide(activeSlideIndex + 1);
            }
        });

        presentation.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0]?.clientX ?? null;
        }, { passive: true });

        presentation.addEventListener('touchend', (event) => {
            if (touchStartX === null || plagues[activePlagueIndex].billboardImages.length < 2) {
                touchStartX = null;
                return;
            }

            const touchEndX = event.changedTouches[0]?.clientX ?? touchStartX;
            const distance = touchEndX - touchStartX;
            touchStartX = null;

            if (Math.abs(distance) > 55) {
                setActiveSlide(activeSlideIndex + (distance < 0 ? 1 : -1));
            }
        }, { passive: true });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && mobileMenu.classList.contains('open')) {
                closeMobileMenu({ returnFocus: true });
            }
        });

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.site-header')) {
                closeMobileMenu();
            }
        });

        window.addEventListener('hashchange', () => {
            setActivePlague(plagueIndexFromHash(), { updateHash: false });
        });

        activePlagueIndex = plagueIndexFromHash();
        render();
    </script>
</body>
</html>
